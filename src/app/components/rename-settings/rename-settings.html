<div class="container-rename-settings">
  <div class="header-rename-settings">
    <div class="title-rename-settings">
      <svg lucideSettings class="svg-icon"></svg>
      <h2>Configuração de Renomeação</h2>
    </div>
    <div class="actions-rename-settings">
      <button class="action-button delete">
        <svg lucideTrash2 class="delete"></svg>
      </button>
    </div>
  </div>
  <div class="rename-settings">
    <div class="input-container">
      <div class="input">
        <label>Titulo</label>
        <input type="text" placeholder="Nome do quadrinho" />
      </div>
      <div class="input">
        <label>Ano</label>
        <input type="text" placeholder="Ex: 2024" />
      </div>
      <div class="input">
        <label>Edição</label>
        <input type="text" placeholder="Ex: 001" />
      </div>
    </div>
    <div class="buttons">
      <button class="rename-preview"><svg lucideEye ></svg> Visualizar</button>
      <button class="onlyrename"><svg lucidePenLine></svg> Renomear</button>
      <button class="convert-to"><svg lucideFileArchive></svg>Converter para</button>
      <button class="omnibus"><svg lucideLayers></svg> Omnibus</button>
    </div>
    <div class="preview-rename">
      <!-- Aqui será exibida a visualização do renomeio -->
    </div>
  </div>
</div>
